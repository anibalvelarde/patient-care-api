apiVersion: v1
kind: Secret
metadata:
  name: {{ include "patient-care-api.fullname" . }}-db
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "patient-care-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_HOST: {{ .Values.database.host | quote }}
  DATABASE_PORT: {{ .Values.database.port | quote }}
  DATABASE_NAME: {{ .Values.database.name | quote }}
  DATABASE_USER: {{ .Values.database.user | quote }}
  DATABASE_PASSWORD: {{ .Values.database.password | quote }}
